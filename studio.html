<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Griot — AI Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #C9960C;
  --gold-light: #E8B830;
  --gold-pale: #F5E6B0;
  --earth: #1A0F00;
  --dark: #0D0800;
  --panel: #1C1200;
  --terra: #8B2500;
  --muted: #8A7A5A;
  --text: #F0E6CC;
  --border: rgba(201,150,12,0.2);
  --success: #6FCF97;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--dark);
  color: var(--text);
  font-family: 'Outfit', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* NAV */
nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(13,8,0,0.95);
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(12px);
}
.nav-logo {
  font-family: 'Cormorant Garamond', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 2px;
  text-decoration: none;
}
.nav-tag {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 24px;
}
.api-status {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
}
.status-dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: #555;
  transition: background 0.3s;
}
.status-dot.live { background: var(--success); box-shadow: 0 0 6px var(--success); }
.status-dot.error { background: #e74c3c; }

/* LAYOUT */
.app-layout {
  display: grid;
  grid-template-columns: 260px 1fr 340px;
  min-height: calc(100vh - 73px);
}

/* SIDEBAR */
.sidebar {
  border-right: 1px solid var(--border);
  padding: 32px 20px;
  background: var(--panel);
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.sidebar-section-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
  padding: 16px 12px 8px;
}
.mode-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 14px;
  border: 1px solid transparent;
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  text-transform: uppercase;
  text-align: left;
  transition: all 0.2s;
  border-radius: 2px;
  width: 100%;
}
.mode-btn:hover {
  color: var(--text);
  background: rgba(201,150,12,0.06);
  border-color: var(--border);
}
.mode-btn.active {
  color: var(--gold);
  background: rgba(201,150,12,0.1);
  border-color: rgba(201,150,12,0.3);
}
.mode-icon { font-size: 16px; width: 20px; text-align: center; }

/* MAIN */
.main-area {
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border);
}

.config-panel {
  padding: 32px 40px;
  border-bottom: 1px solid var(--border);
  background: rgba(28,18,0,0.5);
}
.config-title {
  font-family: 'Cormorant Garamond', serif;
  font-size: 32px;
  font-weight: 300;
  color: var(--text);
  margin-bottom: 4px;
}
.config-title em { color: var(--gold); font-style: italic; }
.config-sub {
  font-size: 13px;
  color: var(--muted);
  margin-bottom: 28px;
  line-height: 1.6;
}

.config-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}
.config-field label {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.config-field select,
.config-field input {
  width: 100%;
  background: rgba(201,150,12,0.05);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 10px 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  appearance: none;
  cursor: pointer;
}
.config-field select:focus,
.config-field input:focus { border-color: var(--gold); }
.config-field select option { background: var(--panel); }

.api-key-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}
.api-key-row .config-field { flex: 1; }
.save-key-btn {
  background: rgba(201,150,12,0.15);
  border: 1px solid var(--border);
  color: var(--gold);
  padding: 10px 16px;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
  height: 40px;
}
.save-key-btn:hover { background: rgba(201,150,12,0.25); border-color: var(--gold); }

/* PROMPT AREA */
.prompt-area {
  flex: 1;
  padding: 32px 40px;
  display: flex;
  flex-direction: column;
  gap: 20px;
}
.prompt-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 8px;
}
.prompt-textarea {
  width: 100%;
  min-height: 140px;
  background: rgba(201,150,12,0.04);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 16px 20px;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  line-height: 1.7;
  outline: none;
  resize: vertical;
  transition: border-color 0.2s;
}
.prompt-textarea:focus { border-color: var(--gold); }
.prompt-textarea::placeholder { color: var(--muted); }

.tone-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 4px;
}
.chip {
  padding: 6px 14px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.chip:hover, .chip.active {
  border-color: var(--gold);
  color: var(--gold);
  background: rgba(201,150,12,0.08);
}

.generate-btn {
  background: var(--gold);
  color: var(--dark);
  border: none;
  padding: 16px 32px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 10px;
  position: relative;
  overflow: hidden;
}
.generate-btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.15);
  transform: translateX(-100%);
  transition: transform 0.3s;
}
.generate-btn:hover::after { transform: translateX(0); }
.generate-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,150,12,0.35); }
.generate-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.spinner {
  width: 14px;
  height: 14px;
  border: 2px solid rgba(13,8,0,0.3);
  border-top-color: var(--dark);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* OUTPUT PANEL */
.output-panel {
  padding: 32px 28px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  background: var(--panel);
  overflow-y: auto;
}
.output-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.output-label {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 3px;
  color: var(--muted);
  text-transform: uppercase;
}
.output-actions {
  display: flex;
  gap: 8px;
}
.action-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--muted);
  padding: 6px 12px;
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  cursor: pointer;
  transition: all 0.2s;
  text-transform: uppercase;
}
.action-btn:hover { border-color: var(--gold); color: var(--gold); }

.output-box {
  flex: 1;
  background: rgba(201,150,12,0.03);
  border: 1px solid var(--border);
  padding: 20px;
  min-height: 300px;
  font-size: 14px;
  line-height: 1.9;
  color: var(--text);
  white-space: pre-wrap;
  font-family: 'Outfit', sans-serif;
  position: relative;
  overflow-y: auto;
}

.output-empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  min-height: 280px;
  gap: 12px;
  color: var(--muted);
  text-align: center;
}
.output-empty .big-icon { font-size: 40px; opacity: 0.4; }
.output-empty p {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px;
  font-style: italic;
}
.output-empty span {
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.streaming-cursor {
  display: inline-block;
  width: 2px;
  height: 16px;
  background: var(--gold);
  animation: blink 1s step-end infinite;
  vertical-align: middle;
  margin-left: 2px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

/* HISTORY */
.history-section {
  border-top: 1px solid var(--border);
  padding: 20px;
}
.history-label {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 2px;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 12px;
}
.history-item {
  padding: 10px 12px;
  border: 1px solid var(--border);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(201,150,12,0.03);
}
.history-item:hover { border-color: var(--gold); }
.history-item-mode {
  font-family: 'Space Mono', monospace;
  font-size: 8px;
  letter-spacing: 1px;
  color: var(--gold);
  text-transform: uppercase;
  margin-bottom: 4px;
}
.history-item-preview {
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 32px;
  right: 32px;
  background: var(--panel);
  border: 1px solid var(--gold);
  color: var(--gold);
  padding: 12px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  letter-spacing: 1px;
  transform: translateY(100px);
  opacity: 0;
  transition: all 0.3s;
  z-index: 999;
}
.toast.show { transform: translateY(0); opacity: 1; }

/* RESPONSIVE */
@media (max-width: 1024px) {
  .app-layout { grid-template-columns: 220px 1fr; }
  .output-panel { display: none; }
}
@media (max-width: 640px) {
  .app-layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
  nav { padding: 16px 20px; }
  .config-row { grid-template-columns: 1fr; }
  .prompt-area, .config-panel { padding: 20px; }
}
</style>
</head>
<body>

<nav>
  <div style="display:flex;align-items:center;gap:16px">
    <a href="index.html" class="nav-logo">Griot</a>
    <span class="nav-tag">AI Studio</span>
  </div>
  <div class="nav-right">
    <div class="api-status">
      <div class="status-dot" id="statusDot"></div>
      <span id="statusText">No Key</span>
    </div>
  </div>
</nav>

<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section-label">Create</div>
    <button class="mode-btn active" data-mode="language" onclick="setMode(this)">
      <span class="mode-icon">🌍</span> Language
    </button>
    <button class="mode-btn" data-mode="story" onclick="setMode(this)">
      <span class="mode-icon">📖</span> Story / Poem
    </button>
    <button class="mode-btn" data-mode="social" onclick="setMode(this)">
      <span class="mode-icon">📱</span> Social Post
    </button>
    <button class="mode-btn" data-mode="lyrics" onclick="setMode(this)">
      <span class="mode-icon">🎵</span> Music Lyrics
    </button>
    <button class="mode-btn" data-mode="podcast" onclick="setMode(this)">
      <span class="mode-icon">🎙️</span> Podcast
    </button>
    <button class="mode-btn" data-mode="script" onclick="setMode(this)">
      <span class="mode-icon">🎬</span> Script Writing
    </button>
    <button class="mode-btn" data-mode="translate" onclick="setMode(this)">
      <span class="mode-icon">🔤</span> Translate
    </button>
    <button class="mode-btn" data-mode="business" onclick="setMode(this)">
      <span class="mode-icon">💼</span> Business Copy
    </button>

    <div class="sidebar-section-label" style="margin-top:8px">Tools</div>
    <button class="mode-btn" data-mode="analyze" onclick="setMode(this)">
      <span class="mode-icon">🔍</span> Vision Analyst
    </button>
    <button class="mode-btn" data-mode="omni" onclick="setMode(this)">
      <span class="mode-icon">🧠</span> Omni-Agent
    </button>
  </aside>

  <!-- MAIN -->
  <main class="main-area">
    <div class="config-panel">
      <h1 class="config-title">AI <em>Studio</em></h1>
      <p class="config-sub" id="modeDesc">Create content in African languages, styles, and cultural contexts. Powered by Gemini.</p>

      <div class="api-key-row" style="margin-bottom:20px">
        <div class="config-field" style="flex:1">
          <label>Gemini API Key</label>
          <input type="password" id="apiKeyInput" placeholder="Paste your Gemini API key here..." autocomplete="off">
        </div>
        <button class="save-key-btn" onclick="saveKey()">Save Key</button>
      </div>

      <div class="config-row">
        <div class="config-field">
          <label>Language / Region</label>
          <select id="languageSelect">
            <option value="English (Pan-African)">English (Pan-African)</option>
            <option value="Setswana (Botswana)">Setswana (Botswana)</option>
            <option value="Shona (Zimbabwe)">Shona (Zimbabwe)</option>
            <option value="Zulu (South Africa)">Zulu (South Africa)</option>
            <option value="Swahili (East Africa)">Swahili (East Africa)</option>
            <option value="Yoruba (Nigeria)">Yoruba (Nigeria)</option>
            <option value="Igbo (Nigeria)">Igbo (Nigeria)</option>
            <option value="Amharic (Ethiopia)">Amharic (Ethiopia)</option>
            <option value="Hausa (West Africa)">Hausa (West Africa)</option>
            <option value="Twi (Ghana)">Twi (Ghana)</option>
            <option value="Xhosa (South Africa)">Xhosa (South Africa)</option>
            <option value="Ndebele (Zimbabwe/South Africa)">Ndebele (Zimbabwe/South Africa)</option>
            <option value="Afrikaans (Southern Africa)">Afrikaans (Southern Africa)</option>
            <option value="French (West Africa)">French (West Africa)</option>
            <option value="Arabic (North Africa)">Arabic (North Africa)</option>
            <option value="Portuguese (Lusophone Africa)">Portuguese (Lusophone Africa)</option>
          </select>
        </div>
        <div class="config-field">
          <label>Content Style</label>
          <select id="styleSelect">
            <option value="Professional">Professional</option>
            <option value="Conversational">Conversational</option>
            <option value="Poetic / Lyrical">Poetic / Lyrical</option>
            <option value="Storytelling / Griot">Storytelling / Griot</option>
            <option value="Satirical / Humorous">Satirical / Humorous</option>
            <option value="Motivational">Motivational</option>
            <option value="Educational">Educational</option>
            <option value="News / Journalistic">News / Journalistic</option>
          </select>
        </div>
      </div>
    </div>

    <div class="prompt-area">
      <div>
        <div class="prompt-label">Your Prompt</div>
        <textarea class="prompt-textarea" id="promptInput" placeholder="Describe what you want to create... e.g. 'Write a poem about a young woman from Gaborone finding her purpose' or 'Write a social post announcing a new business launch in Nairobi'"></textarea>
      </div>

      <div>
        <div class="prompt-label">Tone</div>
        <div class="tone-chips">
          <button class="chip active" onclick="toggleChip(this)">Authentic</button>
          <button class="chip" onclick="toggleChip(this)">Bold</button>
          <button class="chip" onclick="toggleChip(this)">Warm</button>
          <button class="chip" onclick="toggleChip(this)">Urgent</button>
          <button class="chip" onclick="toggleChip(this)">Poetic</button>
          <button class="chip" onclick="toggleChip(this)">Humorous</button>
          <button class="chip" onclick="toggleChip(this)">Spiritual</button>
          <button class="chip" onclick="toggleChip(this)">Political</button>
        </div>
      </div>

      <button class="generate-btn" id="generateBtn" onclick="generate()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">✦ Generate</span>
      </button>
    </div>
  </main>

  <!-- OUTPUT PANEL -->
  <aside class="output-panel">
    <div class="output-header">
      <div class="output-label">Output</div>
      <div class="output-actions">
        <button class="action-btn" onclick="copyOutput()">Copy</button>
        <button class="action-btn" onclick="clearOutput()">Clear</button>
      </div>
    </div>

    <div class="output-box" id="outputBox">
      <div class="output-empty" id="emptyState">
        <div class="big-icon">✦</div>
        <p>Your creation appears here</p>
        <span>Configure · Prompt · Generate</span>
      </div>
    </div>

    <div class="history-section">
      <div class="history-label">Recent</div>
      <div id="historyList"></div>
    </div>
  </aside>

</div>

<div class="toast" id="toast"></div>

<script>
// ─── STATE ───────────────────────────────────────────────────────────────────
let currentMode = 'language';
let history = [];
let apiKey = localStorage.getItem('griot_gemini_key') || '';

const modeDescriptions = {
  language: 'Create content rooted in African languages and cultural context.',
  story: 'Write short stories, poems, fables, and spoken word in African narrative tradition.',
  social: 'Craft social media posts for Instagram, Twitter/X, LinkedIn, and Facebook.',
  lyrics: 'Write song lyrics in Afrobeats, Amapiano, Afropop, Highlife, and more.',
  podcast: 'Generate podcast scripts, episode outlines, and show notes.',
  script: 'Write video scripts, documentary narration, short film dialogue.',
  translate: 'Translate content between African languages and English.',
  business: 'Write marketing copy, pitches, proposals, and business content.',
  analyze: 'Analyze text for sentiment, cultural context, and audience fit.',
  omni: 'Open-ended creative and analytical tasks — anything goes.',
};

const modePromptPrefixes = {
  language: 'You are Griot, Africa\'s AI creative platform. Write the following content deeply rooted in African linguistic and cultural traditions, using idioms, proverbs, or storytelling structures native to the specified language/region.',
  story: 'You are Griot, Africa\'s AI creative platform. Write a compelling story or poem using African narrative traditions — the griot oral tradition, ancestral references, vivid landscapes, and authentic emotional depth.',
  social: 'You are Griot, Africa\'s AI creative platform. Write an engaging social media post. Include relevant hashtags. Make it feel authentic to the African creator experience — not Westernized.',
  lyrics: 'You are Griot, Africa\'s AI creative platform. Write song lyrics deeply inspired by African musical genres. Include song structure (Verse/Chorus/Bridge). Capture the rhythm and cultural soul of the genre.',
  podcast: 'You are Griot, Africa\'s AI creative platform. Write a polished podcast script with host intro, key talking points, transitions, and outro. Keep the voice African and conversational.',
  script: 'You are Griot, Africa\'s AI creative platform. Write a professional video or film script. Include scene direction, character dialogue, and narrative description. Ground it in African settings and perspectives.',
  translate: 'You are Griot, Africa\'s AI translation engine. Translate the following content accurately, preserving cultural nuance, tone, and idiomatic meaning — not just literal word-for-word translation.',
  business: 'You are Griot, Africa\'s AI creative platform. Write professional business copy that speaks to an African audience. Be persuasive, clear, culturally grounded, and commercially sharp.',
  analyze: 'You are Griot, Africa\'s AI analyst. Analyze the following text for cultural tone, target audience, sentiment, key themes, and suggestions for improvement from an African creator perspective.',
  omni: 'You are Griot, Africa\'s AI creative platform — the griot of the digital age. Help the user with their request. Be culturally intelligent, creative, and distinctly African in perspective.',
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
if (apiKey) {
  document.getElementById('apiKeyInput').value = '••••••••••••••••';
  updateStatus('live', 'Key Saved');
}

function saveKey() {
  const val = document.getElementById('apiKeyInput').value.trim();
  if (!val || val.includes('•')) { showToast('Enter a valid API key'); return; }
  apiKey = val;
  localStorage.setItem('griot_gemini_key', apiKey);
  document.getElementById('apiKeyInput').value = '••••••••••••••••';
  updateStatus('live', 'Key Saved');
  showToast('✦ API key saved');
}

function updateStatus(state, text) {
  const dot = document.getElementById('statusDot');
  const label = document.getElementById('statusText');
  dot.className = 'status-dot ' + state;
  label.textContent = text;
}

// ─── MODE ─────────────────────────────────────────────────────────────────────
function setMode(btn) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentMode = btn.dataset.mode;
  document.getElementById('modeDesc').textContent = modeDescriptions[currentMode];
}

// ─── CHIPS ────────────────────────────────────────────────────────────────────
function toggleChip(chip) { chip.classList.toggle('active'); }

function getActiveTones() {
  return [...document.querySelectorAll('.chip.active')].map(c => c.textContent).join(', ');
}

// ─── GENERATE ─────────────────────────────────────────────────────────────────
async function generate() {
  if (!apiKey) { showToast('⚠ Please save your Gemini API key first'); return; }

  const prompt = document.getElementById('promptInput').value.trim();
  if (!prompt) { showToast('⚠ Enter a prompt first'); return; }

  const language = document.getElementById('languageSelect').value;
  const style = document.getElementById('styleSelect').value;
  const tones = getActiveTones();

  const systemPrefix = modePromptPrefixes[currentMode];
  const fullPrompt = `${systemPrefix}

Language/Region: ${language}
Style: ${style}
Tone: ${tones || 'Authentic'}

User Request: ${prompt}

Deliver high-quality, culturally authentic output. Do not add meta-commentary — just the content itself.`;

  // UI loading state
  const btn = document.getElementById('generateBtn');
  const spinner = document.getElementById('spinner');
  const btnText = document.getElementById('btnText');
  btn.disabled = true;
  spinner.style.display = 'block';
  btnText.textContent = 'Generating...';
  updateStatus('', 'Working...');

  // Clear output
  const box = document.getElementById('outputBox');
  box.innerHTML = '<span class="streaming-cursor"></span>';

  try {
    const response = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`,
      {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: fullPrompt }] }],
          generationConfig: {
            temperature: 0.85,
            maxOutputTokens: 1500,
            topP: 0.95,
          }
        })
      }
    );

    if (!response.ok) {
      const err = await response.json();
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text;

    if (!text) throw new Error('No content returned from Gemini');

    // Animate text output
    box.innerHTML = '';
    await typeText(box, text);

    // Save to history
    history.unshift({ mode: currentMode, prompt: prompt.slice(0, 60), output: text });
    if (history.length > 8) history.pop();
    renderHistory();

    updateStatus('live', 'Ready');
    showToast('✦ Content generated');

  } catch (err) {
    box.innerHTML = `<span style="color:#e74c3c">⚠ Error: ${err.message}</span>`;
    updateStatus('error', 'Error');
    showToast('⚠ ' + err.message);
  } finally {
    btn.disabled = false;
    spinner.style.display = 'none';
    btnText.textContent = '✦ Generate';
  }
}

async function typeText(el, text) {
  el.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'streaming-cursor';
  el.appendChild(cursor);

  const chunkSize = 4;
  for (let i = 0; i < text.length; i += chunkSize) {
    const chunk = text.slice(i, i + chunkSize);
    const node = document.createTextNode(chunk);
    el.insertBefore(node, cursor);
    await new Promise(r => setTimeout(r, 12));
  }
  cursor.remove();
}

// ─── OUTPUT ACTIONS ───────────────────────────────────────────────────────────
function copyOutput() {
  const box = document.getElementById('outputBox');
  const text = box.innerText;
  if (!text || text.includes('creation appears here')) { showToast('Nothing to copy'); return; }
  navigator.clipboard.writeText(text).then(() => showToast('✦ Copied to clipboard'));
}

function clearOutput() {
  const box = document.getElementById('outputBox');
  box.innerHTML = `<div class="output-empty" id="emptyState">
    <div class="big-icon">✦</div>
    <p>Your creation appears here</p>
    <span>Configure · Prompt · Generate</span>
  </div>`;
}

// ─── HISTORY ─────────────────────────────────────────────────────────────────
function renderHistory() {
  const list = document.getElementById('historyList');
  if (history.length === 0) { list.innerHTML = ''; return; }
  list.innerHTML = history.map((item, i) => `
    <div class="history-item" onclick="loadHistory(${i})">
      <div class="history-item-mode">${item.mode}</div>
      <div class="history-item-preview">${item.prompt}...</div>
    </div>
  `).join('');
}

function loadHistory(i) {
  const item = history[i];
  const box = document.getElementById('outputBox');
  box.innerHTML = '';
  typeText(box, item.output);
}

// ─── TOAST ────────────────────────────────────────────────────────────────────
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ─── KEYBOARD ────────────────────────────────────────────────────────────────
document.getElementById('promptInput').addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') generate();
});
</script>
</body>
</html>
